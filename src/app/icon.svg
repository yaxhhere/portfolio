<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#080608"/>

  <!-- Inner border ring -->
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.55"/>

  <!-- Top-left corner bracket -->
  <polyline points="2,9 2,2 9,2" fill="none" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="square"/>
  <!-- Bottom-right corner bracket -->
  <polyline points="23,30 30,30 30,23" fill="none" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="square"/>

  <!-- Subtle diagonal accent lines (top-right, bottom-left) -->
  <polyline points="23,2 30,2 30,9"   fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.35"/>
  <polyline points="2,23 2,30 9,30"   fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- YK monogram -->
  <text
    x="16" y="22"
    text-anchor="middle"
    fill="#c9a84c"
    font-family="Arial Narrow, Arial, sans-serif"
    font-size="16"
    font-weight="900"
    letter-spacing="-0.5"
  >YK</text>
</svg>
